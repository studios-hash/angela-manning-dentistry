  <script type="text/babel">
// shared.jsx — Reusable building blocks for all 3 homepage directions.
// Exposes components on window so other Babel scripts can use them.

const { useState, useEffect, useRef, useCallback } = React;

// ──────────────────────────────────────────────────────────────────────
// Placeholder with Higgsfield prompt caption
// Use: <Ph w h prompt="..." aerial portrait video />
// ──────────────────────────────────────────────────────────────────────
function Ph({ w, h, prompt, src, alt, objectPosition, aerial, portrait, video, style, label, className = "", children }) {
  const classes = ["ph", className];
  if (aerial) classes.push("ph--aerial");
  if (portrait) classes.push("ph--portrait");
  return (
    <div
      className={classes.join(" ")}
      style={{ width: w || "100%", height: h || 240, ...style }}
    >
      {src && (
        <img
          src={src}
          alt={alt || ""}
          style={{
            position: "absolute", inset: 0, zIndex: 1,
            width: "100%", height: "100%",
            objectFit: "cover",
            objectPosition: objectPosition || "center",
            display: "block",
          }}
        />
      )}
      {video && <PlayBadge />}
      {!src && prompt && <div className="ph__label">{prompt}</div>}
      {!src && label && !prompt && (
        <div className="ph__label" style={{ background: "rgba(255,255,255,0.7)" }}>
          {label}
        </div>
      )}
      {children}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────
// VideoBG — autoplay/muted/loop drone footage of the practice.
// Used as the primary hero background across all three directions.
// ──────────────────────────────────────────────────────────────────────
const HERO_VIDEO_SRC = "uploads/manning_webBG_V4.mp4";

function VideoBG({ height = 520, overlay, objectPosition = "center", style, children }) {
  const videoRef = useRef(null);
  useEffect(() => {
    const el = videoRef.current;
    if (!el) return;
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    let raf = null;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        const y = Math.min(Math.max(window.scrollY * 0.08, -30), 60);
        el.style.transform = `translateY(${y}px) scale(1.08)`;
        raf = null;
      });
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => { window.removeEventListener("scroll", onScroll); if (raf) cancelAnimationFrame(raf); };
  }, []);
  return (
    <div style={{
      position: "relative", width: "100%", height,
      overflow: "hidden", background: "var(--ink)",
      ...style,
    }}>
      <video
        ref={videoRef}
        autoPlay muted loop playsInline
        aria-hidden="true"
        style={{
          position: "absolute", inset: 0, zIndex: 0,
          width: "100%", height: "100%",
          objectFit: "cover", objectPosition,
          display: "block",
        }}
      >
        <source src={HERO_VIDEO_SRC} type="video/mp4" />
      </video>
      {overlay && (
        <div style={{ position: "absolute", inset: 0, zIndex: 1, background: overlay, pointerEvents: "none" }} />
      )}
      {children}
    </div>
  );
}

function PlayBadge() {
  return (
    <div style={{
      position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 2, pointerEvents: "none",
    }}>
      <div style={{
        width: 64, height: 64, borderRadius: 999,
        background: "rgba(254,254,254,0.85)",
        backdropFilter: "blur(8px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: "0 8px 30px rgba(13,71,161,0.25)",
      }}>
        <svg width="20" height="22" viewBox="0 0 20 22" fill="none">
          <path d="M2 2L18 11L2 20V2Z" fill="#0D47A1" />
        </svg>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────
// Logo — uses brand wordmark style (Noto Serif italic "Angela Mning"-esque)
// Brandbook shows the wordmark as "Angela Mning" with a stylized M
// ──────────────────────────────────────────────────────────────────────
function Logo({ onDark = false, size = 40 }) {
  // `size` = rendered height in px; the banner carries the custom wordmark.
  const src = onDark ? "images/logo_banner_white.png" : "images/logo_banner.png";
  return (
    <img
      src={src}
      alt="Angela Manning Dentistry"
      style={{ height: size, width: "auto", display: "block" }}
    />
  );
}

function LogoMark({ size = 22, fill = "var(--brand-royal)" }) {
  // Simple elegant "AM" monogram in a circle — placeholder for the real custom mark
  const s = size + 6;
  return (
    <svg width={s} height={s} viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <circle cx="16" cy="16" r="15" stroke={fill} strokeWidth="1" fill="none" />
      <path
        d="M9 22 L13.5 9.5 L18 22 M10.6 18 L16.4 18"
        stroke={fill} strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"
      />
      <path
        d="M19 22 L19 9.5 L22.5 16 L26 9.5 L26 22"
        stroke={fill} strokeWidth="1.2" fill="none" strokeLinecap="round" strokeLinejoin="round"
      />
    </svg>
  );
}

// ──────────────────────────────────────────────────────────────────────
// Header — sticky, with location indicator and Book CTA
// ──────────────────────────────────────────────────────────────────────
const NAV_ITEMS = [
  { label: "About", href: "about.html", key: "about" },
  { label: "Services", href: "services.html", key: "services" },
  { label: "Patients", href: "patients.html", key: "patients" },
  { label: "Smile Gallery", href: "gallery.html", key: "gallery" },
  { label: "Contact", href: "contact.html", key: "contact" },
];

const OFFICES = {
  Rye: { name: "Rye office", phone: "(914) 967-1123", address: "66 Milton Rd, Suite A13, Rye, NY 10580" },
  "Rye Brook": { name: "Rye Brook office", phone: "(914) 305-6555", address: "555 Westchester Ave, Rye Brook, NY 10573" },
};

function PageLoader() {
  const [phase, setPhase] = useState("in"); // in -> out -> gone
  useEffect(() => {
    let seen;
    try { seen = sessionStorage.getItem("amd_loader_seen"); } catch (e) { seen = null; }
    if (seen) { setPhase("gone"); return; }
    try { sessionStorage.setItem("amd_loader_seen", "1"); } catch (e) {}
    const t1 = setTimeout(() => setPhase("out"), 650);
    const t2 = setTimeout(() => setPhase("gone"), 1050);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);
  if (phase === "gone") return null;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 9999,
      background: "var(--ink)",
      display: "flex", alignItems: "center", justifyContent: "center",
      opacity: phase === "out" ? 0 : 1,
      transition: "opacity .4s ease",
      pointerEvents: phase === "out" ? "none" : "auto",
    }}>
      <div style={{ animation: "amdLoaderPulse 1.1s ease-in-out infinite" }}>
        <LogoMark size={34} fill="var(--brand-white)" />
      </div>
    </div>
  );
}

function Header({ variant = "safe", scrolled = false, dark = false, active = "" }) {
  const [openMenu, setOpenMenu] = useState(null);
  const [loc, setLoc] = useState("Rye");
  const bg = dark
    ? "rgba(14,27,44,0.72)"
    : scrolled
      ? "rgba(254,254,254,0.92)"
      : "rgba(254,254,254,0.0)";
  const textColor = dark ? "var(--brand-white)" : "var(--ink)";
  const borderColor = dark ? "rgba(255,255,255,0.08)" : "var(--line-soft)";

  return (
    <React.Fragment>
    <PageLoader />
    <header
      className="sticky-top"
      style={{
        background: bg,
        backdropFilter: "blur(14px)",
        WebkitBackdropFilter: "blur(14px)",
        borderBottom: `1px solid ${borderColor}`,
        transition: "background .25s ease, border-color .25s ease",
        color: textColor,
      }}
    >
      {/* Top utility row — location switcher + language + phone */}
      <div style={{
        background: dark ? "transparent" : "rgba(13,71,161,0.04)",
        borderBottom: `1px solid ${borderColor}`,
        fontSize: 12,
        color: dark ? "rgba(255,255,255,0.7)" : "var(--ink-mute)",
      }}>
        <div style={{
          maxWidth: 1280, margin: "0 auto", padding: "8px 32px",
          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 24,
        }}>
          <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
            <LocationPill dark={dark} loc={loc} setLoc={setLoc} />
            <span style={{ opacity: 0.4 }}>·</span>
            <a href={`tel:${OFFICES[loc].phone.replace(/[^\d+]/g, "")}`} style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "inherit" }}>
              <Icon name="phone" size={11} /> {OFFICES[loc].phone}
            </a>
          </div>
          <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
            <LangSwitcher dark={dark} />
            <span style={{ opacity: 0.4 }}>·</span>
            <span>Mon–Thu 8–5 · Fri 8–12</span>
          </div>
        </div>
      </div>

      {/* Main nav */}
      <div style={{
        maxWidth: 1280, margin: "0 auto", padding: "18px 32px",
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 24,
      }}>
        <a href="index.html" style={{ display: "flex", alignItems: "center" }}>
          <Logo size={variant === "bold" ? 46 : 44} onDark={dark} />
        </a>

        <nav style={{ display: "flex", gap: 28, fontSize: 14 }}>
          {NAV_ITEMS.map(item => (
            <a
              key={item.key}
              href={item.href}
              style={{
                color: textColor,
                opacity: active === item.key ? 1 : 0.85,
                fontWeight: active === item.key ? 600 : 400,
                transition: "opacity .15s",
                position: "relative",
                paddingBottom: 2,
                borderBottom: active === item.key ? `1.5px solid ${textColor}` : "1.5px solid transparent",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.opacity = 1; }}
              onMouseLeave={(e) => { e.currentTarget.style.opacity = active === item.key ? 1 : 0.85; }}
            >
              {item.label}
            </a>
          ))}
        </nav>

        <a href="contact.html" className="btn btn-primary" style={{ fontSize: 13, padding: "12px 20px" }}>
          Book a visit
          <Icon name="arrow-right" size={12} />
        </a>
      </div>

  );
}

function LocationPill({ dark, loc, setLoc }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 6,
      cursor: "pointer", userSelect: "none",
    }}
      onClick={() => setLoc(loc === "Rye" ? "Rye Brook" : "Rye")}
      title="Switch location"
    >
      <span style={{
        width: 6, height: 6, borderRadius: 999,
        background: "var(--brand-sky)",
        boxShadow: "0 0 0 3px rgba(117,165,225,0.25)",
      }} />
      <Icon name="pin" size={11} />
      <span style={{ fontWeight: 500 }}>{loc} office</span>
      <Icon name="chevron-down" size={9} />
    </span>
  );
}

function LangSwitcher({ dark }) {
  const [lang, setLang] = useState("EN");
  const langs = ["EN", "ES", "PT"];
  return (
    <span style={{ display: "inline-flex", gap: 2, alignItems: "center" }}>
      {langs.map(l => (
        <button
          key={l}
          onClick={() => setLang(l)}
          style={{
            padding: "3px 7px",
            fontSize: 11,
            fontWeight: lang === l ? 600 : 400,
            color: lang === l ? "var(--brand-royal)" : "inherit",
            background: lang === l ? "rgba(13,71,161,0.08)" : "transparent",
            borderRadius: 4,
            letterSpacing: "0.05em",
          }}
        >{l}</button>
      ))}
    </span>
  );
}

// ──────────────────────────────────────────────────────────────────────
// Icons (inline SVG — small set)
// ──────────────────────────────────────────────────────────────────────
function Icon({ name, size = 16, color = "currentColor", strokeWidth = 1.5 }) {
  const props = {
    width: size, height: size, viewBox: "0 0 24 24",
    fill: "none", stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
    style: { flexShrink: 0 },
  };
  switch (name) {
    case "arrow-right": return <svg {...props}><path d="M5 12h14M13 6l6 6-6 6"/></svg>;
    case "arrow-up-right": return <svg {...props}><path d="M7 17L17 7M8 7h9v9"/></svg>;
    case "phone": return <svg {...props}><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>;
    case "pin": return <svg {...props}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>;
    case "chevron-down": return <svg {...props}><path d="M6 9l6 6 6-6"/></svg>;
    case "chevron-right": return <svg {...props}><path d="M9 18l6-6-6-6"/></svg>;
    case "calendar": return <svg {...props}><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>;
    case "sparkle": return <svg {...props}><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>;
    case "shield": return <svg {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
    case "tooth": return <svg {...props}><path d="M12 2c-3 0-5 2-7 2s-2 2-2 4c0 4 1 6 2 9 .5 1.5 1 3 1 5 0 0 1-1 2-3s1-4 2-5h1c1 1 1 3 2 5s2 3 2 3c0-2 .5-3.5 1-5 1-3 2-5 2-9 0-2 0-4-2-4s-4-2-7-2z"/></svg>;
    case "heart": return <svg {...props}><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>;
    case "smile": return <svg {...props}><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>;
    case "star": return <svg {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    case "play": return <svg {...props}><polygon points="6 4 20 12 6 20 6 4"/></svg>;
    case "check": return <svg {...props}><polyline points="20 6 9 17 4 12"/></svg>;
    case "music": return <svg {...props}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>;
    case "leaf": return <svg {...props}><path d="M11 20A7 7 0 014 13V5h7a7 7 0 010 14z"/><path d="M5 13c5-1 9-5 9-9"/></svg>;
    case "clock": return <svg {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    case "menu": return <svg {...props}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
    case "x": return <svg {...props}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    case "mail": return <svg {...props}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
    case "drag": return <svg {...props} fill="currentColor" stroke="none"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>;
    default: return null;
  }
}

// ──────────────────────────────────────────────────────────────────────
// BeforeAfter slider — drag handle to reveal "after"
// ──────────────────────────────────────────────────────────────────────
function BeforeAfter({ beforeLabel, afterLabel, beforePrompt, afterPrompt, beforeSrc, afterSrc, height = 420, accent = "var(--brand-royal)" }) {
  const ref = useRef(null);
  const [pos, setPos] = useState(50);
  const dragging = useRef(false);

  const updateFromX = (clientX) => {
    if (!ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const x = clientX - rect.left;
    const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
    setPos(pct);
  };

  useEffect(() => {
    const onMove = (e) => {
      if (!dragging.current) return;
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      updateFromX(x);
    };
    const onUp = () => { dragging.current = false; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("touchmove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("touchend", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchend", onUp);
    };
  }, []);

  return (
    <div
      ref={ref}
      className="framed"
      style={{
        position: "relative",
        width: "100%",
        height,
        overflow: "hidden",
        userSelect: "none",
        cursor: "ew-resize",
        background: "var(--brand-warm)",
      }}
      onMouseDown={(e) => { dragging.current = true; updateFromX(e.clientX); }}
      onTouchStart={(e) => { dragging.current = true; updateFromX(e.touches[0].clientX); }}
    >
      {/* AFTER (full underneath) */}
      <div style={{ position: "absolute", inset: 0 }}>
        <Ph aerial={false} portrait w="100%" h="100%" src={afterSrc} prompt={afterPrompt} style={{ borderRadius: 0 }} />
        <Tag style={{ right: 16, bottom: 16, background: accent, color: "white" }}>
          {afterLabel || "After"}
        </Tag>
      </div>
      {/* BEFORE (clipped via clip-path so it stays pixel-aligned with AFTER) */}
      <div style={{
        position: "absolute", inset: 0,
        clipPath: `inset(0 ${100 - pos}% 0 0)`,
        WebkitClipPath: `inset(0 ${100 - pos}% 0 0)`,
      }}>
        <Ph portrait w="100%" h="100%" src={beforeSrc} prompt={beforePrompt} style={{ borderRadius: 0, filter: "saturate(0.85)" }} />
        <Tag style={{ left: 16, bottom: 16, background: "rgba(14,27,44,0.78)", color: "white" }}>
          {beforeLabel || "Before"}
        </Tag>
      </div>
      {/* Handle */}
      <div
        style={{
          position: "absolute", top: 0, bottom: 0, left: `${pos}%`,
          width: 2, background: "var(--brand-white)",
          transform: "translateX(-50%)",
          boxShadow: "0 0 0 1px rgba(13,71,161,0.18), 0 0 24px rgba(13,71,161,0.25)",
          pointerEvents: "none",
        }}
      >
        <div style={{
          position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          width: 44, height: 44, borderRadius: 999,
          background: "var(--brand-white)",
          boxShadow: "0 4px 16px rgba(13,71,161,0.3)",
          display: "flex", alignItems: "center", justifyContent: "center",
          color: "var(--brand-royal)",
          pointerEvents: "auto",
          cursor: "ew-resize",
        }}>
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
            <path d="M5 1L1 7L5 13M13 1L17 7L13 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  );
}

function Tag({ children, style = {} }) {
  return (
    <span style={{
      position: "absolute",
      padding: "6px 12px",
      fontFamily: "var(--mono)",
      fontSize: 10,
      fontWeight: 500,
      letterSpacing: "0.12em",
      textTransform: "uppercase",
      borderRadius: 999,
      backdropFilter: "blur(6px)",
      ...style,
    }}>{children}</span>
  );
}

// ──────────────────────────────────────────────────────────────────────
// Footer — same across directions, minor styling can vary
// ──────────────────────────────────────────────────────────────────────
function Footer({ variant = "safe" }) {
  const dark = variant !== "editorial";
  return (
    <footer style={{
      background: dark ? "var(--ink)" : "var(--cream)",
      color: dark ? "rgba(255,255,255,0.85)" : "var(--ink)",
      padding: "80px 32px 32px",
    }}>
      <div style={{ maxWidth: 1280, margin: "0 auto" }}>
        <div style={{

// AI Concierge — small chat dot powered by window.claude.complete
// ──────────────────────────────────────────────────────────────────────
function Concierge({ accentColor = "var(--brand-royal)" }) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([
    { role: "assistant", text: "Hi — I'm Manning's after-hours concierge. Ask about services, insurance, or what to expect at your first visit." },
  ]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);

  const send = async () => {
    const text = input.trim();
    if (!text || busy) return;
    setMsgs(m => [...m, { role: "user", text }]);
    setInput("");
    setBusy(true);
    try {
      const reply = await window.claude.complete({
        messages: [
          { role: "user", content:
            "You are a friendly concierge for Angela Manning Dentistry (Rye + Rye Brook, NY). " +
            "Dr. Angela Manning and Dr. Camilla Acevedo. Out-of-network but accept PPO. " +
            "Discount plan for uninsured. Services include preventive, cosmetic (whitening, veneers), " +
            "implants, Invisalign, endodontics, periodontics, pediatric, TMJ/Botox. " +
            "Tone: warm, neighborly, calm, not scary. Keep replies to 2-3 sentences. " +
            "If user asks to book, suggest tapping the 'Book a visit' button or calling (914) 967-1123 (Rye) or (914) 305-6555 (Rye Brook). " +
            "User question: " + text },
        ],
      });
      setMsgs(m => [...m, { role: "assistant", text: reply }]);
    } catch (e) {
      setMsgs(m => [...m, { role: "assistant", text: "Hmm, I'm having trouble right now. Please call us at (914) 967-1123 or tap Book a visit." }]);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ position: "absolute", bottom: 24, right: 24, zIndex: 60 }}>
      {open && (
        <div style={{
          position: "absolute", bottom: 70, right: 0,
          width: 320,
          background: "var(--brand-white)",
          borderRadius: 18,
          boxShadow: "0 20px 60px rgba(13,71,161,0.25)",
          border: "1px solid var(--line)",
          overflow: "hidden",
          display: "flex", flexDirection: "column",
          maxHeight: 420,
        }}>
          <div style={{
            padding: "14px 16px",
            background: accentColor,
            color: "white",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
            <div>
              <div style={{ fontFamily: "var(--serif)", fontSize: 16 }}>Ask the concierge</div>
              <div style={{ fontSize: 11, opacity: 0.85 }}>Replies in seconds · powered by AI</div>
            </div>
            <button onClick={() => setOpen(false)} style={{ color: "white", padding: 4 }}>
              <Icon name="x" size={16} />
            </button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{
                alignSelf: m.role === "user" ? "flex-end" : "flex-start",
                background: m.role === "user" ? accentColor : "var(--brand-mist)",
                color: m.role === "user" ? "white" : "var(--ink)",
                padding: "9px 13px",
                borderRadius: 14,
                fontSize: 13,
                lineHeight: 1.45,
                maxWidth: "85%",
              }}>{m.text}</div>
            ))}
            {busy && <div style={{ fontSize: 11, color: "var(--ink-mute)", fontStyle: "italic" }}>thinking…</div>}
          </div>
          <div style={{ padding: 10, borderTop: "1px solid var(--line)", display: "flex", gap: 6 }}>
            <input
              value={input}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && send()}
              placeholder="Type a question…"
              style={{
                flex: 1, border: "1px solid var(--line)", borderRadius: 999,
                padding: "8px 14px", fontSize: 13, background: "var(--offwhite)",
              }}
            />
            <button onClick={send} disabled={busy} style={{
              background: accentColor, color: "white",
              borderRadius: 999, padding: "8px 14px", fontSize: 13,
            }}>Send</button>
          </div>
        </div>
      )}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          width: 56, height: 56, borderRadius: 999,
          background: accentColor, color: "white",
          boxShadow: "0 10px 30px rgba(13,71,161,0.3)",
          display: "flex", alignItems: "center", justifyContent: "center",
        }}
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
        </svg>
      </button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// Scroll-reveal — fades/slides .reveal elements into place once
// ─────────────────────────────────────────────────────────────────
(function initReveal() {
  const run = () => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("in-view");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });
    document.querySelectorAll(".reveal:not(.in-view)").forEach((el) => io.observe(el));
  };
  if (document.readyState === "complete") run();
  else window.addEventListener("load", run);
  // Re-scan shortly after in case React mounted late elements
  setTimeout(run, 400);
})();
